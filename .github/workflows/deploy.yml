name: Deploy
# CD: push na main -> runner self-hosted no CT atualiza, builda e recarrega nginx.
on:
  push:
    branches: [main]
concurrency:
  group: deploy-page-v7m
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, page-v7m]
    steps:
      - name: Atualiza, builda e recarrega nginx
        run: |
          set -e
          cd /opt/v7m.org
          git fetch --all --prune
          git reset --hard origin/main
          npm ci --no-audit --no-fund
          npm run build
          nginx -t && systemctl reload nginx
          echo "deploy OK -- page-v7m publicado (purgar cache CF se HTML mudou)"
